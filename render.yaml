# Render Blueprint: API + Postgres + Redis (all free-tier eligible).
# https://render.com/docs/blueprint-spec
#
# Redis backs the Django cache and (if you later add ASGI serving) the
# Channels layer — see config/settings.py. No Celery worker here: Render's
# free tier doesn't cover Background Worker services (only Web Services,
# Postgres, and Key Value are free-eligible; a worker needs Starter, ~$7/mo).
# So CELERY_TASK_ALWAYS_EAGER stays True and background tasks (OTP/welcome
# emails, push fan-out) run synchronously in-request — see accounts/tasks.py
# and notifications/services.py. To go async later: add a `type: worker`
# service running `celery -A config worker -l info` (paid plan required),
# then flip CELERY_TASK_ALWAYS_EAGER to False.
#
# Not included on purpose (add later if needed): a Celery beat service (no
# periodic tasks are defined yet) and ASGI/websocket serving for chat +
# notifications — the web service below runs gunicorn (WSGI), so Channels
# consumers won't accept live connections yet even with a Redis-backed layer.
databases:
  - name: education-os-db
    plan: free
    databaseName: education_os
    user: education_os

services:
  - type: keyvalue
    name: education-os-redis
    plan: free
    # Blocks the public internet; other services in this Blueprint still
    # reach it over Render's private network via the connection string below.
    ipAllowList: []

  - name: education-os-backend
    type: web
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /health/
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_SECURE_COOKIES
        value: "True"
      # .onrender.com wildcard covers whatever subdomain Render assigns this
      # service; add your custom domain here too if you attach one later.
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com,localhost,127.0.0.1"
      - key: DJANGO_CSRF_TRUSTED_ORIGINS
        value: "https://*.onrender.com"
      # Open for now so the mobile app / admin console can call the API
      # during testing. Lock this down to explicit origins once you know
      # your deployed frontend URL(s).
      - key: CORS_ALLOW_ALL_ORIGINS
        value: "True"
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: education-os-redis
          property: connectionString
      # No worker to consume a broker queue on the free tier, so tasks run
      # inline instead of via Celery/Redis (see the file header comment).
      - key: CELERY_TASK_ALWAYS_EAGER
        value: "True"
      # First-boot admin account (accounts.User: USERNAME_FIELD=email,
      # REQUIRED_FIELDS=[full_name]). Fill in email/password when Render
      # prompts you during Blueprint creation.
      - key: DJANGO_CREATE_SUPERUSER
        value: "true"
      - key: DJANGO_SUPERUSER_EMAIL
        sync: false
      - key: DJANGO_SUPERUSER_PASSWORD
        sync: false
      - key: DJANGO_SUPERUSER_FULL_NAME
        value: "Admin"
      # Fresh DB has no users otherwise. Seeds 9 demo role logins
      # (password: campus123) so the mobile app has something to log into.
      # Idempotent; unset once you have real data.
      - key: DJANGO_SEED_DEMO
        value: "true"
      - key: POSTGRES_DB
        fromDatabase:
          name: education-os-db
          property: database
      - key: POSTGRES_USER
        fromDatabase:
          name: education-os-db
          property: user
      - key: POSTGRES_PASSWORD
        fromDatabase:
          name: education-os-db
          property: password
      - key: POSTGRES_HOST
        fromDatabase:
          name: education-os-db
          property: host
      - key: POSTGRES_PORT
        fromDatabase:
          name: education-os-db
          property: port
