{% extends "courses/base.html" %}
{% block title %}Delete {{ object.code }} · education-os{% endblock %}
{% block content %}
  <h1>Delete course</h1>
  <div class="card">
    <p>Are you sure you want to delete
       <strong>{{ object.code }} — {{ object.title }}</strong>?
       This cannot be undone.</p>
    <form method="post">
      {% csrf_token %}
      <div class="actions">
        <button class="btn danger" type="submit">Yes, delete</button>
        <a class="btn secondary" href="{% url 'courses:detail' object.pk %}">Cancel</a>
      </div>
    </form>
  </div>
{% endblock %}
